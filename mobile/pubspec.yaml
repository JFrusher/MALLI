name: malli
description: MALLI malaria field analysis — offline blood smear screening for Android
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera capture
  camera: ^0.10.0+1

  # File paths and local storage
  path_provider: ^2.0.15
  path: ^1.8.3

  # SQLite persistence
  sqflite: ^2.3.0

  # On-device TFLite inference (MobileNetV3 INT8)
  tflite_flutter: ^0.10.4

  # Image decoding and manipulation (used by detection_pipeline.dart)
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
