name: malli
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  - pip
  - pip-tools
  
  # Core ML
  - tensorflow::tensorflow=2.13.1
  - numpy=1.24.3
  - scipy
  - scikit-learn=1.3.0
  - scikit-image=0.21.0
  - pandas
  
  # Image Processing
  - opencv=4.8.0
  - pillow=10.0.0
  - imageio
  
  # Visualization
  - matplotlib=3.7.2
  - tensorboard=2.13.0
  
  # Development
  - jupyter
  - ipython
  - black
  - flake8
  - pylint
  - mypy
  - pytest
  
  # System
  - git
  - curl
  
pip:
  - albumentations==1.3.1
  - torch==2.1.0
  - ultralytics==8.0.181
  - tensorflow-hub==0.14.0
  - typing-extensions==4.5.0
  
  # Optional: Export formats
  # Uncomment to use:
  # - tf2onnx==1.14.0
  # - onnx==1.14.0
  # - onnxruntime==1.16.0
  # - coremltools==7.0
